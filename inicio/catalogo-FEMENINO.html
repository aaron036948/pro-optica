<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Óptica Tendencia Urbana</title>

    <link rel="stylesheet" href="inicio.css/estilos.css">
    <link rel="stylesheet" href="inicio.css/header.css">
    <link rel="stylesheet" href="inicio.css/slider.css">
    <link rel="stylesheet" href="inicio.css/footer.css">
    <link rel="stylesheet" href="inicio.css/responcividad.css">
    <link rel="stylesheet" href="inicio.css/estilo-catalogo.css">
</head>

<body>

<header id="header-sitio"></header>

<!-- 🔥 SLIDER DE ANCHO COMPLETO -->
<section class="hero-slider">
    <img src="img/presentacion/imagen1.jpg" class="slide active">
    <img src="img/presentacion/imagen2.jpg" class="slide">
    <img src="img/presentacion/imagen3.jpg" class="slide">

    <button class="prev">❮</button>
    <button class="next">❯</button>
</section>

<main class="contenedor-principal">
    
    <section class="class-section">
        
        <h2 class="titulo-apartado">Colección Varones</h2>

        <div class="grid-principal"> 
            
            <article class="class-catalogo">
                <div class="caja-img">
                    <img src="img/gafas-varones/61-azul-verde.webp" alt="Lente Masculino">
                </div>
                <h3>SKYLINE NAVY</h3>
                <span class="precio">Bs 245.00</span>
            </article>

            <article class="class-catalogo">
                <div class="caja-img">
                    <img src="img/gafas-unisex/004.webp" alt="Lente Masculino">
                </div>
                <h3>VINTAGE BROWN</h3>
                <span class="precio">Bs 260.00</span>
            </article>

            <article class="class-catalogo">
                <div class="caja-img">
                    <img src="img/gafas-varones/SATELLITE-PLATA-NEGRA.webp" alt="Lente Masculino">
                </div>
                <h3>SATELLITE SILVER</h3>
                <span class="precio">Bs 270.00</span>
            </article>

            <article class="class-catalogo">
                <div class="caja-img">
                    <img src="img/gafas-varones/negros.webp" alt="Lente Masculino">
                </div>
                <h3>DARK CITY</h3>
                <span class="precio">Bs 215.00</span>
            </article>

            <article class="class-catalogo">
                <div class="caja-img">
                    <img src="img/gafas-varones/WESTON-DORADA-CAFE.webp" alt="Lente Masculino">
                </div>
                <h3>GOLDEN WESTON</h3>
                <span class="precio">Bs 290.00</span>
            </article>

        </div>
    </section>

</main>

</main>

<!-- FOOTER -->
<footer class="pie" id="footer-sitio"></footer>

<script src="inicio.js/Catalogo.js"></script>
<script src="inicio.js/buscar.js"></script>
<script src="inicio.js/db.js"></script>
<script src="inicio.js/sesion.js"></script>

</body>
</html>
